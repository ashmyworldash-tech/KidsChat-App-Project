<!DOCTYPE html>
<html>
<head>
    <title>KidsChat AI - Funny Popups</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; background: #ece5dd; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* App Header */
        #header { background: #075e54; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .user-indicator { background: #128c7e; padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; }

        /* Full Screen Chat Area */
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Classic WhatsApp Background */ }
        
        /* Message Containers */
        .msg-row { display: flex; flex-direction: column; position: relative; max-width: 80%; }
        .sent-row { align-self: flex-end; }
        .received-row { align-self: flex-start; }

        .bubble { padding: 10px 15px; border-radius: 10px; position: relative; z-index: 2; font-size: 1rem; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent-row .bubble { background: #dcf8c6; border-top-right-radius: 0; }
        .received-row .bubble { background: #ffffff; border-top-left-radius: 0; }
        
        .name-label { font-size: 0.75rem; font-weight: bold; margin-bottom: 3px; color: #075e54; }

        /* THE FUNNY POPUP AVATAR */
        .popup-container {
            position: absolute;
            width: 150px; height: 150px;
            top: -100px;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        .sent-row .popup-container { right: -20px; }
        .received-row .popup-container { left: -20px; }

        /* Funny Animations */
        .pop-active { display: block !important; animation: funnyJump 2s ease-in-out forwards; }

        @keyframes funnyJump {
            0% { transform: scale(0) translateY(50px) rotate(0deg); opacity: 0; }
            20% { transform: scale(1.2) translateY(-20px) rotate(10deg); opacity: 1; }
            40% { transform: scale(1) translateY(0) rotate(-10deg); opacity: 1; }
            80% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0) translateY(20px); opacity: 0; }
        }

        /* Controls */
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; }
        input { flex-grow: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        .btn-send { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-switch { background: #128c7e; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="header">
        <span>Kids AI Group</span>
        <button class="btn-switch" onclick="switchUser()">🔄 Switch: <span id="user-label">Me</span></button>
    </div>

    <div id="chat-box">
        <div class="msg-row received-row">
            <div class="name-label">AI Buddy</div>
            <div class="bubble">Try typing "JUMP", "HELLO", or "HAPPY" to see me pop up!</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Say something funny...">
        <button class="btn-send" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        let currentUser = "Me";

        function switchUser() {
            currentUser = (currentUser === "Me") ? "Friend" : "Me";
            document.getElementById('user-label').innerText = currentUser;
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if (text === "") return;

            const isMe = (currentUser === "Me");
            
            // 1. Create Row
            const row = document.createElement('div');
            row.className = `msg-row ${isMe ? 'sent-row' : 'received-row'}`;

            // 2. Add Name & Bubble
            row.innerHTML = `
                <div class="name-label">${currentUser}</div>
                <div class="bubble">${text}</div>
                <div class="popup-container">
                    <model-viewer src="lopoly_ryu.glb" autoplay shadow-intensity="1" style="width:100%; height:100%"></model-viewer>
                </div>
            `;

            chatBox.appendChild(row);

            // 3. LOGIC: Check for keywords to trigger funny popup
            const upperText = text.toUpperCase();
            const popup = row.querySelector('.popup-container');
            const mv = row.querySelector('model-viewer');

            if (upperText.includes("JUMP") || upperText.includes("HAPPY") || upperText.includes("HELLO")) {
                // Determine which internal 3D animation to play
                if (upperText.includes("JUMP")) mv.animationName = "jump";
                if (upperText.includes("HELLO")) mv.animationName = "wave";
                
                // Show the funny popup
                setTimeout(() => {
                    popup.classList.add('pop-active');
                }, 200);
            }

            msgInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
