<!DOCTYPE html>
<html>
<head>
    <title>KidsChat AI - Secure Face Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; background: #f0f2f5; color: #333; text-align: center; font-family: 'Helvetica Neue', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 3D Avatar Area */
        model-viewer { width: 100%; height: 40vh; background: #fff; border-bottom: 2px solid #ddd; }
        
        /* Chat History Area */
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 70%; font-size: 0.9rem; text-align: left; }
        .sent { align-self: flex-end; background: #dcf8c6; border: 1px solid #c7e5ae; }
        .received { align-self: flex-start; background: white; border: 1px solid #ddd; }

        /* Input Area */
        .controls { padding: 15px; background: white; border-top: 1px solid #ddd; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        
        .button-group { display: flex; justify-content: center; gap: 10px; }
        button { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-send { background: #007bff; color: white; }
        .btn-start { background: #28a745; color: white; font-size: 0.8rem; }
        .btn-stop { background: #dc3545; color: white; font-size: 0.8rem; }
        #input_video { display: none; }
    </style>
</head>
<body>

    <model-viewer id="avatar" src="lopoly_ryu.glb" shadow-intensity="1" autoplay></model-viewer>

    <div id="chat-box">
        <div class="message received">👋 Welcome to KidsChat! Start your camera to begin.</div>
    </div>

    <div class="controls">
        <div id="status" style="font-size: 0.7rem; color: #666;">Status: System Standby</div>
        
        <div class="input-row">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button class="btn-send" onclick="sendMessage()">Send</button>
        </div>

        <div class="button-group">
            <button class="btn-start" onclick="startApp()">🚀 Start Camera</button>
            <button class="btn-stop" onclick="stopApp()">🔒 Stop Camera</button>
        </div>
    </div>

    <video id="input_video" playsinline></video>

    <script>
        const modelViewer = document.querySelector('#avatar');
        const videoElement = document.getElementById('input_video');
        const statusText = document.getElementById('status');
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        let cameraInstance = null;

        // --- CHAT LOGIC ---
        function sendMessage() {
            const text = msgInput.value;
            if (text.trim() === "") return;

            // Add message to screen
            const msgDiv = document.createElement('div');
            msgDiv.className = "message sent";
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            
            // Clear input and scroll to bottom
            msgInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- AI & CAMERA LOGIC ---
        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
        faceMesh.onResults((results) => {
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
            statusText.innerText = "Status: ✨ AI Syncing";
            const nose = results.multiFaceLandmarks[0][4];
            modelViewer.cameraOrbit = `${(nose.x - 0.5) * -90}deg ${(nose.y - 0.5) * 60 + 75}deg auto`;
        });

        async function startApp() {
            statusText.innerText = "Status: Starting Camera...";
            cameraInstance = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({image: videoElement}); },
                width: 640, height: 480
            });
            await cameraInstance.start();
        }

        function stopApp() {
            if (cameraInstance) {
                cameraInstance.stop();
                const stream = videoElement.srcObject;
                if (stream) stream.getTracks().forEach(t => t.stop());
                videoElement.srcObject = null;
                statusText.innerText = "Status: 🔒 Camera Off";
                modelViewer.cameraOrbit = `0deg 75deg auto`;
            }
        }
    </script>
</body>
</html>
