<!DOCTYPE html>
<html>
<head>
    <title>KidsChat AI Lab</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f8ff; }
        model-viewer { width: 100%; height: 500px; background-color: #ffffff; }
        #controls { padding: 20px; }
    </style>
</head>
<body>

    <h1>Avatar AI Testing Ground</h1>
    <div id="status">✅ AI Engine Ready</div>

    <model-viewer id="avatar" src="lopoly_ryu.glb" shadow-intensity="1" camera-controls touch-action="pan-y" autoplay>
    </model-viewer>

    <div id="controls">
        <p>If you see the character above, our 3D engine is working!</p>
        <button onclick="startCamera()">Step 6: Test Camera Connection</button>
    </div>

    <video id="webcam" style="display:none;" autoplay></video>

    <script>
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('webcam').srcObject = stream;
                alert("Camera Connected! The AI can now 'see' you.");
                document.getElementById('status').innerText = "🚀 Camera Active - Ready for Face Mapping";
            } catch (err) {
                alert("Please allow camera access to test the AI.");
            }
        }
    </script>
</body>
</html>
