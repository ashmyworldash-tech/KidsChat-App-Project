<!DOCTYPE html>
<html>
<head>
    <title>KidsChat - Funny AI Popups</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; background: #f0f2f5; font-family: 'Comic Sans MS', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* The Main Avatar View */
        model-viewer#avatar { width: 100%; height: 30vh; background: white; }

        /* The Chat Area */
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; position: relative; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 70%; z-index: 1; }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: white; }

        /* THE FUNNY POPUP STAGE */
        #popup-stage {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; pointer-events: none; z-index: 10; display: none;
        }

        /* Animation Styles */
        .funny-spin { animation: spinMe 1s ease-in-out; display: block !important; }
        .funny-grow { animation: growMe 1s ease-in-out; display: block !important; }

        @keyframes spinMe {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5) rotate(360deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0) rotate(720deg); opacity: 0; }
        }

        @keyframes growMe {
            0% { transform: translate(-50%, -100%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(2.5); opacity: 1; }
            100% { transform: translate(-50%, 0%) scale(0); opacity: 0; }
        }

        .controls { padding: 15px; background: white; border-top: 1px solid #ddd; }
        .input-row { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; }
        button { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        #input_video { display: none; }
    </style>
</head>
<body>

    <model-viewer id="avatar" src="lopoly_ryu.glb" shadow-intensity="1" autoplay></model-viewer>

    <div id="chat-box">
        <div id="popup-stage">
            <model-viewer src="lopoly_ryu.glb" autoplay style="width:100%; height:100%"></model-viewer>
        </div>
        <div class="message received">Type "SPIN" or "BIG" to see a funny popup!</div>
    </div>

    <div class="controls">
        <div class="input-row">
            <input type="text" id="msg-input" placeholder="Type funny words...">
            <button style="background:#007bff; color:white;" onclick="sendMessage()">Send</button>
        </div>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
            <button style="background:#28a745; color:white;" onclick="startApp()">📹 Sync</button>
            <button style="background:#dc3545; color:white;" onclick="stopApp()">🔒 Stop</button>
        </div>
    </div>

    <video id="input_video" playsinline></video>

    <script>
        const chatBox = document.getElementById('chat-box');
        const popupStage = document.getElementById('popup-stage');
        const msgInput = document.getElementById('msg-input');
        const videoElement = document.getElementById('input_video');

        function sendMessage() {
            const text = msgInput.value.toUpperCase();
            if (text.trim() === "") return;

            // 1. Add Message
            const msgDiv = document.createElement('div');
            msgDiv.className = "message sent";
            msgDiv.innerText = msgInput.value;
            chatBox.appendChild(msgDiv);

            // 2. CHECK FOR FUNNY KEYWORDS
            if (text.includes("SPIN")) {
                showPopup("funny-spin");
            } else if (text.includes("BIG")) {
                showPopup("funny-grow");
            }

            msgInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showPopup(animationClass) {
            popupStage.className = animationClass;
            // Remove the class after 1 second so it can be played again
            setTimeout(() => { popupStage.className = ""; }, 1000);
        }

        // --- Standard Sync Logic ---
        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.onResults((results) => {
            if (!results.multiFaceLandmarks || !results.multiFaceLandmarks[0]) return;
            const nose = results.multiFaceLandmarks[0][4];
            document.getElementById('avatar').cameraOrbit = `${(nose.x - 0.5) * -90}deg ${(nose.y - 0.5) * 60 + 75}deg auto`;
        });

        async function startApp() {
            const camera = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({image: videoElement}); },
                width: 640, height: 480
            });
            camera.start();
        }

        function stopApp() {
            const stream = videoElement.srcObject;
            if (stream) stream.getTracks().forEach(t => t.stop());
            videoElement.srcObject = null;
        }
    </script>
</body>
</html>
