<script>
    const modelViewer = document.querySelector('#avatar');
    const videoElement = document.getElementById('input_video');
    const statusText = document.getElementById('status');
    let cameraInstance = null; // This keeps track of the camera "engine"

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
    faceMesh.onResults(onResults);

    function onResults(results) {
        if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
        const landmarks = results.multiFaceLandmarks[0];
        const nose = landmarks[4];
        const horizontalTurn = (nose.x - 0.5) * -90;
        const verticalTilt = (nose.y - 0.5) * 60 + 75;
        modelViewer.cameraOrbit = `${horizontalTurn}deg ${verticalTilt}deg auto`;
    }

    async function startApp() {
        statusText.innerText = "Camera Starting...";
        cameraInstance = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraInstance.start();
        statusText.innerText = "✨ AI Syncing... (Camera is ON)";
    }

    function stopApp() {
        if (cameraInstance) {
            // This stops the AI engine
            cameraInstance.stop(); 
            // This physically turns off the camera hardware
            const stream = videoElement.srcObject;
            const tracks = stream.getTracks();
            tracks.forEach(track => track.stop());
            
            videoElement.srcObject = null;
            statusText.innerText = "🔒 Camera Closed - Privacy Active";
        }
    }
</script>
