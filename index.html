<!DOCTYPE html>
<html>
<head>
    <title>KidsChat - Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; background: #f0f2f5; color: #333; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #ad-banner { background: #fff9c4; padding: 5px; font-size: 0.7rem; border-bottom: 1px solid #fbc02d; color: #555; text-align: center; }
        model-viewer { width: 100%; height: 35vh; background: linear-gradient(#ffffff, #e3f2fd); }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 70%; font-size: 0.9rem; }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: white; }
        .controls { padding: 15px; background: white; border-top: 1px solid #ddd; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex-grow: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        .btn-group { display: flex; justify-content: space-around; gap: 5px; }
        button { padding: 10px 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-main { background: #007bff; color: white; }
        #input_video { display: none; }
    </style>
</head>
<body>

    <div id="ad-banner">✨ Sponsored by LEGO: Build Your World! ✨</div>
    <model-viewer id="avatar" src="lopoly_ryu.glb" shadow-intensity="1" autoplay></model-viewer>

    <div id="chat-box">
        <div class="message received">Camera Fix Applied. Click "Sync Face" to test!</div>
    </div>

    <div class="controls">
        <div id="status" style="font-size: 0.7rem; text-align:center; color: #666; margin-bottom:5px;">Status: Standby</div>
        <div class="input-row">
            <input type="text" id="msg-input" placeholder="Type here...">
            <button class="btn-main" onclick="sendMessage()">Send</button>
        </div>
        <div class="btn-group">
            <button style="background:#28a745; color:white;" onclick="startApp()">📹 Sync Face</button>
            <button style="background:#dc3545; color:white;" onclick="stopApp()">🔒 Stop</button>
            <button style="background:#673ab7; color:white;" onclick="toggleCostume()">🎭 New Look</button>
        </div>
    </div>

    <video id="input_video" playsinline></video>

    <script>
        const modelViewer = document.querySelector('#avatar');
        const videoElement = document.getElementById('input_video');
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        const statusText = document.getElementById('status');
        
        // GLOBAL VARIABLE: This is the secret to making "Stop" work
        window.activeCamera = null;

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.onResults((results) => {
            if (!results.multiFaceLandmarks || !results.multiFaceLandmarks[0]) return;
            const nose = results.multiFaceLandmarks[0][4];
            modelViewer.cameraOrbit = `${(nose.x - 0.5) * -90}deg ${(nose.y - 0.5) * 60 + 75}deg auto`;
            statusText.innerText = "Status: ✨ AI Syncing";
        });

        async function startApp() {
            statusText.innerText = "Status: Waking up camera...";
            try {
                // If a camera is already running, stop it first to prevent errors
                if (window.activeCamera) await stopApp();

                window.activeCamera = new Camera(videoElement, {
                    onFrame: async () => { await faceMesh.send({image: videoElement}); },
                    width: 640, height: 480
                });
                await window.activeCamera.start();
            } catch (err) {
                console.error(err);
                statusText.innerText = "Status: ❌ Camera Error";
            }
        }

        async function stopApp() {
            statusText.innerText = "Status: Shutting down...";
            if (window.activeCamera) {
                await window.activeCamera.stop();
                
                // Physically cut the hardware stream
                const stream = videoElement.srcObject;
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                videoElement.srcObject = null;
                window.activeCamera = null;
                
                statusText.innerText = "Status: 🔒 Camera Off";
                modelViewer.cameraOrbit = `0deg 75deg auto`;
            }
        }

        function sendMessage() {
            const text = msgInput.value;
            if (text.trim() === "") return;
            const msgDiv = document.createElement('div');
            msgDiv.className = "message sent";
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            msgInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function toggleCostume() {
            const colors = ["#ffffff", "#ffccbc", "#c8e6c9", "#e1f5fe"];
            modelViewer.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        }
    </script>
</body>
</html>
